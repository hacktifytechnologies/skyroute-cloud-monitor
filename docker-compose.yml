services:
  web:
    image: hacktifytechnologies/skyroute:1.0
    container_name: skyroute
    ports:
      - "8083:80"
    environment:
      DB_HOST: db
      DB_NAME: skyroute
      DB_USER: dev_user
      DB_PASS: dev_pass
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: skyroute-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: skyroute
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_pass
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3308:3306"
